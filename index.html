<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dapur Jejenz — Order via WhatsApp</title>
  <meta name="description" content="Aplikasi order Dapur Jejenz: menu foto, varian, WhatsApp checkout, diskon, stok, tracking, export, dan laporan." />
  <meta name="theme-color" content="#ef6c00" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta property="og:title" content="Dapur Jejenz" />
  <meta property="og:description" content="Pesan Es Teler, Smoothies, dan Salad Buah Dapur Jejenz via WhatsApp." />
  <meta property="og:image" content="brand.png" />
  <style>
    :root{--bg:#fff7ed;--card:#fff;--text:#24140c;--muted:#7c5f4a;--primary:#ef6c00;--primary-dark:#c2410c;--accent:#16a34a;--danger:#dc2626;--line:#fed7aa;--soft:#fff7ed;--shadow:0 18px 45px rgba(124,45,18,.12)}
    body.dark{--bg:#1c1207;--card:#2a1809;--text:#fdf2e9;--muted:#f1b78b;--primary:#fb923c;--primary-dark:#fdba74;--accent:#22c55e;--danger:#f87171;--line:#7c2d12;--soft:#1c1207;--shadow:0 18px 45px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#ffedd5,var(--bg) 40%,#fff 100%);color:var(--text)}body.dark{background:radial-gradient(circle at top left,#2a1809,var(--bg) 40%,#1c1207 100%)}
    header{position:sticky;top:0;z-index:10;backdrop-filter:blur(16px);background:rgba(255,247,237,.86);border-bottom:1px solid var(--line)}body.dark header{background:rgba(28,18,7,.86)}
    .topbar{max-width:1180px;margin:auto;padding:14px 16px;display:flex;justify-content:space-between;gap:12px;align-items:center}.brand{display:flex;gap:12px;align-items:center}.logo{height:48px;display:block;object-fit:contain}h1,h2,h3,p{margin:0}h1{font-size:20px;line-height:1.1}.subtitle,.small{color:var(--muted);font-size:12px}.container{max-width:1180px;margin:auto;padding:18px 16px 80px}.hero{display:grid;grid-template-columns:1.3fr .7fr;gap:16px;margin-bottom:16px}.panel,.card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}body.dark .panel,body.dark .card{background:rgba(42,24,9,.9)}.panel{padding:20px}.hero h2{font-size:30px;margin-bottom:8px}.hero p{color:var(--muted);line-height:1.5}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.stat{padding:14px;border-radius:18px;background:var(--soft);border:1px solid var(--line)}.stat b{display:block;font-size:18px}.layout{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}input,select,textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:16px;font:inherit;outline:none;background:white;color:var(--text)}body.dark input,body.dark select,body.dark textarea{background:#2a1809;color:var(--text)}input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px #fed7aa66}.search{flex:1 1 240px}.category{flex:0 0 170px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.menu-card{padding:14px;display:grid;gap:10px}.menu-img{aspect-ratio:4/3;width:100%;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#fff7ed,#fed7aa);border:1px solid #fdba74;overflow:hidden;padding:8px;box-sizing:border-box}.menu-img img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}).format(value||0);
    const key='dapurJejenz.v2'; const themeKey='dapurJejenz.theme'; const whatsappNumber='6281414031098'; const adminPin='1234';
    const makeId=()=>crypto.randomUUID();
    const defaultState={menus:[
      {id:makeId(),name:'Es Teler',emoji:'🍧',category:'Dessert',price:13000,desc:'Es teler segar dengan buah dan kuah manis creamy.',image:'',variants:[{name:'Original',extra:0},{name:'Jumbo',extra:5000}]},
      {id:makeId(),name:'Smoothies Cappucino',emoji:'☕',category:'Smoothies',price:15000,desc:'Smoothies rasa cappucino yang creamy dan dingin.',image:'',variants:[{name:'Original',extra:0},{name:'Extra topping',extra:3000}]},
      {id:makeId(),name:'Smoothies Mangga',emoji:'🥭',category:'Smoothies',price:15000,desc:'Smoothies mangga segar dengan tekstur lembut.',image:'',variants:[{name:'Original',extra:0},{name:'Jumbo',extra:5000}]},
      {id:makeId(),name:'Smoothies Alpukat',emoji:'🥑',category:'Smoothies',price:15000,desc:'Smoothies alpukat creamy dan mengenyangkan.',image:'',variants:[{name:'Original',extra:0},{name:'Jumbo',extra:5000}]},
      {id:makeId(),name:'Smoothies Strawberry',emoji:'🍓',category:'Smoothies',price:15000,desc:'Smoothies strawberry segar dengan rasa manis asam.',image:'',variants:[{name:'Original',extra:0},{name:'Extra topping',extra:3000}]},
      {id:makeId(),name:'Smoothies Cookies & Cream',emoji:'🍪',category:'Smoothies',price:15000,desc:'Smoothies cookies & cream manis, creamy, dan crunchy.',image:'',variants:[{name:'Original',extra:0},{name:'Extra cookies',extra:4000}]},
      {id:makeId(),name:'Salad Buah',emoji:'🥗',category:'Dessert',price:17000,desc:'Salad buah segar dengan saus creamy.',image:'',variants:[{name:'Cup kecil',extra:0},{name:'Cup besar',extra:8000}]}
    ],cart:{},orders:[]};
    let state=load(); let isAdmin=false;
    function load(){try{const saved=JSON.parse(localStorage.getItem(key));return saved&&saved.menus?saved:structuredClone(defaultState)}catch{return structuredClone(defaultState)}}
    function save(){localStorage.setItem(key,JSON.stringify(state))}
    function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
    function discount(subtotal){return subtotal>=50000?Math.round(subtotal*.1):0}
    function cartKey(menuId,variantName){return `${menuId}__${variantName||'Original'}`}
    function cartItems(){return Object.entries(state.cart).map(([key,qty])=>{const [menuId,variantName]=key.split('__');const menu=state.menus.find(m=>m.id===menuId);if(!menu)return null;const variant=(menu.variants||[{name:'Original',extra:0}]).find(v=>v.name===variantName)||{name:'Original',extra:0};return{...menu,cartKey:key,qty,variant:variant.name,unitPrice:Number(menu.price)+Number(variant.extra||0)}}).filter(Boolean)}
    function subtotal(){return cartItems().reduce((sum,item)=>sum+item.unitPrice*item.qty,0)}
    function finalTotal(){const sub=subtotal();return sub-discount(sub)}
    function imageHtml(menu){return menu.image?`<img src="${menu.image}" alt="${menu.name}">`:(menu.emoji||'🍽️')}
    function renderStats(){document.getElementById('statOrders').textContent=state.orders.length;document.getElementById('statRevenue').textContent=rupiah(state.orders.reduce((s,o)=>s+o.total,0));document.getElementById('statMenus').textContent=state.menus.length;document.getElementById('statPending').textContent=state.orders.filter(o=>o.status!=='Selesai').length;document.getElementById('todayText').textContent=new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
    function renderCategories(){const select=document.getElementById('categoryFilter');const categories=['Semua',...new Set(state.menus.map(m=>m.category))];const current=select.value||'Semua';select.innerHTML=categories.map(c=>`<option ${c===current?'selected':''}>${c}</option>`).join('')}
    function renderMenus(){const grid=document.getElementById('menuGrid');const search=document.getElementById('searchInput').value.toLowerCase();const cat=document.getElementById('categoryFilter').value||'Semua';const menus=state.menus.filter(m=>`${m.name} ${m.desc} ${m.category}`.toLowerCase().includes(search)&&(cat==='Semua'||m.category===cat));grid.innerHTML=menus.map(menu=>{const variants=menu.variants||[{name:'Original',extra:0}];return`<article class="card menu-card"><div class="menu-img">${imageHtml(menu)}</div><div class="menu-head"><div><div class="menu-name">${menu.name}</div><div class="small">${menu.category}</div></div><div class="price">${rupiah(menu.price)}</div></div><p class="menu-desc">${menu.desc||'Menu dapur siap dipesan.'}</p><select id="variant-${menu.id}">${variants.map(v=>`<option value="${v.name}">${v.name}${v.extra?` +${rupiah(v.extra)}`:''}</option>`).join('')}</select><button onclick="addToCart('${menu.id}')">Tambah</button></article>`}).join('')||'<div class="empty">Menu tidak ditemukan.</div>'}
    function renderCart(){const list=document.getElementById('cartList');const items=cartItems();document.getElementById('cartCount').textContent=`${items.reduce((s,i)=>s+i.qty,0)} item`;document.getElementById('cartDiscount').textContent=`- ${rupiah(discount(subtotal()))}`;document.getElementById('cartTotal').textContent=rupiah(finalTotal());list.innerHTML=items.map(item=>`<div class="cart-item"><div class="cart-row"><div><b>${item.emoji} ${item.name}</b><div class="small">${item.variant} • ${rupiah(item.unitPrice)} x ${item.qty}</div></div><div class="qty"><button class="btn-light" onclick="changeQty('${item.cartKey}',-1)">-</button><b>${item.qty}</b><button onclick="changeQty('${item.cartKey}',1)">+</button></div></div></div>`).join('')||'<div class="empty">Keranjang masih kosong.</div>'}
    function renderHistory(){const list=document.getElementById('historyList');list.innerHTML=state.orders.slice().reverse().slice(0,12).map(o=>`<div class="history-item"><div class="cart-row"><b>${o.customer}</b><b>${rupiah(o.total)}</b></div><div class="small">${new Date(o.createdAt).toLocaleString('id-ID')}</div><div class="small">${o.items.map(i=>`${i.name} (${i.variant}) x${i.qty}`).join(', ')}</div><div class="cart-row" style="margin-top:8px"><span class="status ${String(o.status).toLowerCase()}">${o.status}</span><select onchange="updateOrderStatus('${o.id}',this.value)"><option ${o.status==='Proses'?'selected':''}>Proses</option><option ${o.status==='Dikonfirmasi'?'selected':''}>Dikonfirmasi</option><option ${o.status==='Selesai'?'selected':''}>Selesai</option></select></div>${o.note?`<div class="small">Catatan: ${o.note}</div>`:''}</div>`).join('')||'<div class="empty">Belum ada order.</div>'}
    function renderAdminMenus(){const list=document.getElementById('adminMenuList');if(!list)return;list.innerHTML=state.menus.map(m=>`<div class="stock-item"><div class="cart-row"><div><b>${m.emoji||'🍽️'} ${m.name}</b><div class="small">${m.category} • ${rupiah(m.price)}</div></div><button class="btn-danger" onclick="deleteMenu('${m.id}')">Hapus</button></div><div class="form-grid" style="margin-top:10px"><input value="${m.name.replaceAll('&','&amp;').replaceAll('\"','&quot;')}" onchange="editMenu('${m.id}','name',this.value)" placeholder="Nama menu"><input value="${m.category.replaceAll('&','&amp;').replaceAll('\"','&quot;')}" onchange="editMenu('${m.id}','category',this.value)" placeholder="Kategori"><input type="number" value="${m.price}" onchange="editMenu('${m.id}','price',this.value)" placeholder="Harga"><input value="${m.emoji||''}" onchange="editMenu('${m.id}','emoji',this.value)" placeholder="Emoji"><textarea rows="2" onchange="editMenu('${m.id}','desc',this.value)" placeholder="Deskripsi">${m.desc||''}</textarea><input type="file" accept="image/*" onchange="updateMenuImage('${m.id}',this.files[0])"></div></div>`).join('')||'<div class="empty">Belum ada menu.</div>'}
    function renderStocks(){return ''}
    function renderAll(){renderStats();renderCategories();renderMenus();renderCart();renderHistory();renderAdminMenus();save()}
    window.addToCart=id=>{const menu=state.menus.find(m=>m.id===id);const selected=document.getElementById(`variant-${id}`)?.value||'Original';const key=cartKey(id,selected);state.cart[key]=(state.cart[key]||0)+1;renderCart();save();toast('Menu masuk keranjang')};
    window.changeQty=(key,delta)=>{state.cart[key]=(state.cart[key]||0)+delta;if(state.cart[key]<=0)delete state.cart[key];renderCart();save()};
    
    window.updateOrderStatus=(id,status)=>{const o=state.orders.find(x=>x.id===id);if(o)o.status=status;renderAll();toast('Status order diperbarui')};
    window.editMenu=(id,field,value)=>{const m=state.menus.find(x=>x.id===id);if(!m)return;m[field]=field==='price'?Number(value||0):value;renderAll();toast('Menu diperbarui')};
    window.deleteMenu=id=>{if(!confirm('Hapus menu ini?'))return;state.menus=state.menus.filter(m=>m.id!==id);Object.keys(state.cart).forEach(k=>{if(k.startsWith(id+'__'))delete state.cart[k]});renderAll();toast('Menu dihapus')};
    window.updateMenuImage=async(id,file)=>{const m=state.menus.find(x=>x.id===id);if(!m||!file)return;m.image=await fileToDataUrl(file);renderAll();toast('Foto menu diperbarui')};
    document.getElementById('searchInput').addEventListener('input',renderMenus);document.getElementById('categoryFilter').addEventListener('change',renderMenus);
    document.getElementById('checkoutBtn').addEventListener('click',()=>{const items=cartItems();if(!items.length)return toast('Keranjang masih kosong');const customer=document.getElementById('customerName').value.trim();if(!customer)return toast('Nama pelanggan wajib diisi');const address=document.getElementById('customerAddress').value.trim();const note=document.getElementById('orderNote').value.trim();const sub=subtotal();const disc=discount(sub);const total=finalTotal();if(total<=0)return toast('Total order tidak valid');const orderLines=items.map(i=>`- ${i.name} (${i.variant}) x${i.qty} = ${rupiah(i.unitPrice*i.qty)}`).join('\n');const message=['🍧 *Order Dapur Jejenz*','',`Nama: ${customer}`,address?`Alamat: ${address}`:'Alamat: -','','Pesanan:',orderLines,'',`Subtotal: ${rupiah(sub)}`,`Diskon: -${rupiah(disc)}`,`Total: *${rupiah(total)}*`,'',note?`Catatan: ${note}`:'Catatan: -','','Mohon konfirmasi ya. Terima kasih 🙏'].join('\n');const order={id:makeId(),customer,address,note,items,total,subtotal:sub,discount:disc,status:'Proses',createdAt:new Date().toISOString()};state.orders.push(order);state.cart={};['customerName','customerAddress','orderNote'].forEach(id=>document.getElementById(id).value='');renderAll();window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`,'_blank');toast('Order dibuka di WhatsApp')});
    document.getElementById('clearHistory').addEventListener('click',()=>{if(!confirm('Hapus semua riwayat order?'))return;state.orders=[];renderAll();toast('Riwayat dibersihkan')});
    function parseVariants(text){return(text||'Original:0').split(',').map(x=>{const [name,extra='0']=x.split(':');return{name:(name||'Original').trim(),extra:Number(extra||0)}}).filter(v=>v.name)}
    function fileToDataUrl(file){return new Promise(resolve=>{if(!file)return resolve('');const r=new FileReader();r.onload=()=>resolve(r.result);r.readAsDataURL(file)})}
    document.getElementById('addMenuBtn').addEventListener('click',async()=>{const name=document.getElementById('menuName').value.trim();const price=Number(document.getElementById('menuPrice').value||0);if(!name||!price)return toast('Nama dan harga wajib diisi');const image=await fileToDataUrl(document.getElementById('menuImage').files[0]);state.menus.push({id:makeId(),name,emoji:document.getElementById('menuEmoji').value.trim()||'🍽️',category:document.getElementById('menuCategory').value.trim()||'Lainnya',price,desc:document.getElementById('menuDesc').value.trim(),image,variants:parseVariants(document.getElementById('menuVariants').value)});['menuName','menuEmoji','menuCategory','menuPrice','menuDesc','menuVariants','menuImage'].forEach(id=>document.getElementById(id).value='');renderAll();toast('Menu ditambahkan')});
    
    function download(name,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
    document.getElementById('exportJson').addEventListener('click',()=>download(`dapur-jejenz-${Date.now()}.json`,JSON.stringify(state,null,2),'application/json'));
    document.getElementById('exportCsv').addEventListener('click',()=>{const rows=[['Tanggal','Pelanggan','Status','Item','Subtotal','Diskon','Total','Catatan']];state.orders.forEach(o=>rows.push([new Date(o.createdAt).toLocaleString('id-ID'),o.customer,o.status,o.items.map(i=>`${i.name} ${i.variant} x${i.qty}`).join('; '),o.subtotal,o.discount,o.total,o.note||'']));download(`order-dapur-jejenz-${Date.now()}.csv`,rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n'),'text/csv')});
    document.getElementById('downloadPdf').addEventListener('click',()=>{
      const orders=state.orders;
      const total=orders.reduce((s,o)=>s+o.total,0);
      const rows=orders.length
        ?orders.map(o=>'<tr><td>'+new Date(o.createdAt).toLocaleString('id-ID')+'</td><td>'+(o.customer||'-').replace(/</g,'&lt;')+'</td><td>'+(o.status||'-')+'</td><td>'+rupiah(o.total)+'</td></tr>').join('')
        :'<tr><td colspan="4" style="text-align:center;color:#999">Belum ada order</td></tr>';
      const html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Laporan Dapur Jejenz</title><style>body{font-family:sans-serif;padding:24px;color:#24140c}h1{color:#ef6c00;margin:0 0 8px}.summary{background:#fff7ed;padding:14px 18px;border-radius:12px;border:1px solid #fed7aa;margin:16px 0}table{width:100%;border-collapse:collapse;margin-top:16px}td,th{border:1px solid #ddd;padding:10px;text-align:left;font-size:14px}th{background:#ef6c00;color:#fff}.total{color:#16a34a;font-weight:bold}</style></head><body><h1>Laporan Dapur Jejenz</h1><div class="summary"><p style="margin:0">Total omzet: <span class="total">'+rupiah(total)+'</span></p><p style="margin:4px 0 0">Jumlah order: <b>'+orders.length+'</b></p><p style="margin:4px 0 0;font-size:12px;color:#7c5f4a">Digenerate: '+new Date().toLocaleString('id-ID')+'</p></div><table><tr><th>Tanggal</th><th>Pelanggan</th><th>Status</th><th>Total</th></tr>'+rows+'</table><script>window.addEventListener("load",function(){setTimeout(function(){window.print()},300)});<\/script></body></html>';
      const w=window.open('','_blank');
      if(!w){toast('Pop-up diblokir, izinkan pop-up untuk download laporan');return}
      w.document.open();
      w.document.write(html);
      w.document.close();
    });
    document.getElementById('themeToggle').addEventListener('click',()=>{document.body.classList.toggle('dark');localStorage.setItem(themeKey,document.body.classList.contains('dark')?'dark':'light');document.getElementById('themeToggle').textContent=document.body.classList.contains('dark')?'Mode Terang':'Mode Gelap'});
    document.getElementById('loginAdmin').addEventListener('click',()=>{if(document.getElementById('adminPin').value!==adminPin)return toast('PIN admin salah');isAdmin=true;document.getElementById('adminLogin').style.display='none';document.getElementById('adminContent').style.display='block';document.getElementById('adminTab').style.display='';if(document.getElementById('adminPinHint'))document.getElementById('adminPinHint').style.display='';toast('Admin aktif')});
    document.getElementById('logoutAdmin').addEventListener('click',()=>{isAdmin=false;document.getElementById('adminLogin').style.display='grid';document.getElementById('adminContent').style.display='none';document.getElementById('adminPin').value='';document.querySelector('.tab[data-view="order"]').click();toast('Admin logout')});
    document.getElementById('resetData').addEventListener('click',()=>{if(!confirm('Reset semua data aplikasi?'))return;localStorage.removeItem(key);state=structuredClone(defaultState);renderAll();toast('Data direset')});
    document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(item=>{item.classList.remove('active');item.classList.add('btn-light')});tab.classList.add('active');tab.classList.remove('btn-light');const view=tab.dataset.view;document.getElementById('orderView').style.display=view==='order'?'grid':'none';document.getElementById('adminView').style.display=view==='admin'?'block':'none'}));
    if(localStorage.getItem(themeKey)==='dark'){document.body.classList.add('dark');document.getElementById('themeToggle').textContent='Mode Terang'}
    renderAll();
  </script>
</body>
</html>
